name: crifo
description: "CriFO - Football Score & Live TV App"
publish_to: 'none'
version: 1.3.0+5

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.2

  # Firebase

  # HTTP & API
  dio: ^5.7.0
  retrofit: ^4.4.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Cache & Storage
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Video player - ExoPlayer based (same as Football Eon)
  video_player: ^2.10.1

  # Crypto (for FotMob token)
  crypto: ^3.0.6
  convert: ^3.1.2

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  firebase_core: ^4.11.0
  firebase_analytics: ^12.4.3
  cloud_firestore: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  retrofit_generator: ^9.1.5
  riverpod_generator: ^2.6.5
  json_serializable: ^6.9.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/tv_player.html
    - assets/tv_index.html
    - assets/hls.min.js
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald-Bold.ttf
          weight: 700
