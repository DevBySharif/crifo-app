name: crifo
description: "CriFO - Football Score & Live TV App"
publish_to: 'none'
version: 1.4.6+16

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Cache & Storage
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1

  # UI
  cupertino_icons: ^1.0.8

  # Video player - ExoPlayer based (same as Football Eon)
  video_player: ^2.10.1

  url_launcher: ^6.3.1
  firebase_core: ^4.11.0

  # Carousel & Security (Adopted from Falcon app concepts)
  flutter_jailbreak_detection: ^1.2.1
  carousel_slider: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/tv_player.html
    - assets/tv_index.html
    - assets/hls.min.js
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/launcher_icon.png"
  adaptive_icon_background: "#08080C"
  adaptive_icon_foreground: "assets/images/launcher_icon_foreground.png"
