name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.4'
          cache: false

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "google-services.json created from secret"
          else
            echo "No GOOGLE_SERVICES_JSON secret — Firebase will be disabled at compile time"
          fi
        shell: bash

      - name: Create release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/crifo-keystore.jks
            cat > android/key.properties <<EOF
          storePassword=crifo2024
          keyPassword=crifo2024
          keyAlias=crifo
          storeFile=crifo-keystore.jks
          EOF
            echo "Keystore created from secret"
          else
            echo "No KEYSTORE_B64 secret — will use debug signing"
          fi
        shell: bash

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --verbose

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: CriFO ${{ github.ref_name }}
          body: |
            Release of CriFO ${{ github.ref_name }}
            
            This release was automatically built and published by GitHub Actions.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync APK to crifo-web (Netlify)
        env:
          PAT: ${{ secrets.CRIFO_WEB_PAT }}
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE="$(grep '^version: ' pubspec.yaml | sed -E 's/.*\+([0-9]+).*/\1/')"
          echo "Syncing v${VERSION_NAME} (code ${VERSION_CODE}) to crifo-web …"

          git clone "https://x-access-token:${PAT}@github.com/DevBySharif/crifo-web.git" /tmp/crifo-web

          cp build/app/outputs/flutter-apk/app-release.apk /tmp/crifo-web/public/app-release.apk

          cat > /tmp/crifo-web/public/version.json <<EOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "apkUrl": "https://crifo.netlify.app/app-release.apk",
            "releaseNotes": ""
          }
          EOF

          cd /tmp/crifo-web
          git config user.name "CriFO CI"
          git config user.email "ci@crifo.app"
          git add .
          git commit -m "Auto-deploy ${GITHUB_REF_NAME} from CI"
          git push
        shell: bash
